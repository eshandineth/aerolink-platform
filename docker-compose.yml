services:
  api-gateway:
    image: nginx:alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "3000:3000"
    depends_on:
      - auth-service
      - flight-service
      - booking-service
      - baggage-service
      - websocket-service

  auth-service:
    build:
      context: ./services/auth-service
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=development
      - PORT=3000
      - DYNAMODB_ENDPOINT=http://dynamodb-local:8000
      - AWS_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=dummy
      - AWS_SECRET_ACCESS_KEY=dummy
      - AWS_XRAY_CONTEXT_MISSING=IGNORE_ERROR
      - JWT_SECRET=local_development_secret
      - AWS_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=dummy
      - AWS_SECRET_ACCESS_KEY=dummy
      - AWS_XRAY_CONTEXT_MISSING=IGNORE_ERROR
    depends_on:
      - dynamodb-local

  flight-service:
    build:
      context: ./services/flight-service
    ports:
      - "3002:3000"
    environment:
      - NODE_ENV=development
      - PORT=3000
      - DYNAMODB_ENDPOINT=http://dynamodb-local:8000
      - AWS_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=dummy
      - AWS_SECRET_ACCESS_KEY=dummy
      - AWS_XRAY_CONTEXT_MISSING=IGNORE_ERROR
    depends_on:
      - dynamodb-local

  booking-service:
    build:
      context: ./services/booking-service
    ports:
      - "3003:3000"
    environment:
      - NODE_ENV=development
      - PORT=3000
      - DYNAMODB_ENDPOINT=http://dynamodb-local:8000
      - AWS_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=dummy
      - AWS_SECRET_ACCESS_KEY=dummy
      - AWS_XRAY_CONTEXT_MISSING=IGNORE_ERROR
    depends_on:
      - dynamodb-local

  baggage-service:
    build:
      context: ./services/baggage-service
    ports:
      - "3004:3000"
    environment:
      - NODE_ENV=development
      - PORT=3000
      - DYNAMODB_ENDPOINT=http://dynamodb-local:8000
      - AWS_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=dummy
      - AWS_SECRET_ACCESS_KEY=dummy
      - AWS_XRAY_CONTEXT_MISSING=IGNORE_ERROR
    depends_on:
      - dynamodb-local

  websocket-service:
    build:
      context: ./services/websocket-service
    ports:
      - "3005:3000"
    environment:
      - NODE_ENV=development
      - PORT=3000

  dynamodb-local:
    image: amazon/dynamodb-local:latest
    ports:
      - "8000:8000"
    command: "-jar DynamoDBLocal.jar -sharedDb -inMemory"
