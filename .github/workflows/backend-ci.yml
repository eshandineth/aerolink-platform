name: Backend CI Pipeline

on:
  push:
    branches:
      - main
    paths:
      - 'services/**'
      - '.github/workflows/backend-ci.yml'

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # Required for requesting the OIDC JWT token
      contents: write # Needed to commit back to the repo

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Configure AWS credentials (Passwordless OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/aerolink-github-actions-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build, tag, and push Auth Service
        env:
          ECR_REPOSITORY: aerolink/auth-service
          IMAGE_TAG: ${{ github.sha }}
        run: |
          cd services/auth-service
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      - name: Build, tag, and push Flight Service
        env:
          ECR_REPOSITORY: aerolink/flight-service
          IMAGE_TAG: ${{ github.sha }}
        run: |
          cd services/flight-service
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      - name: Build, tag, and push Booking Service
        env:
          ECR_REPOSITORY: aerolink/booking-service
          IMAGE_TAG: ${{ github.sha }}
        run: |
          cd services/booking-service
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      - name: Build, tag, and push Baggage Service
        env:
          ECR_REPOSITORY: aerolink/baggage-service
          IMAGE_TAG: ${{ github.sha }}
        run: |
          cd services/baggage-service
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      - name: Build, tag, and push WebSocket Service
        env:
          ECR_REPOSITORY: aerolink/websocket-service
          IMAGE_TAG: ${{ github.sha }}
        run: |
          cd services/websocket-service
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      - name: Update Kubernetes manifests
        run: |
          # Replace old tags with the new commit SHA
          sed -i "s|image: .*/auth-service:.*|image: ${{ env.ECR_REGISTRY }}/aerolink/auth-service:${{ github.sha }}|g" k8s-manifests/auth-service.yaml
          sed -i "s|image: .*/flight-service:.*|image: ${{ env.ECR_REGISTRY }}/aerolink/flight-service:${{ github.sha }}|g" k8s-manifests/flight-service.yaml
          sed -i "s|image: .*/booking-service:.*|image: ${{ env.ECR_REGISTRY }}/aerolink/booking-service:${{ github.sha }}|g" k8s-manifests/booking-service.yaml
          sed -i "s|image: .*/baggage-service:.*|image: ${{ env.ECR_REGISTRY }}/aerolink/baggage-service:${{ github.sha }}|g" k8s-manifests/baggage-service.yaml
          sed -i "s|image: .*/websocket-service:.*|image: ${{ env.ECR_REGISTRY }}/aerolink/websocket-service:${{ github.sha }}|g" k8s-manifests/websocket-service.yaml

      - name: Commit and Push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add k8s-manifests/
          git commit -m "chore: update kubernetes image tags to ${{ github.sha }} [skip ci]"
          git push
