name: Frontend CD to S3

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # Required for requesting the OIDC JWT token
      contents: read # Needed to checkout the repo
    
    defaults:
      run:
        working-directory: frontend

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install Dependencies
      run: npm install

    - name: Build React App
      run: npm run build

    - name: Configure AWS Credentials (Passwordless OIDC)
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/aerolink-github-actions-role
        aws-region: us-east-1

    - name: Deploy to S3
      run: aws s3 sync dist/ s3://aerolink-frontend-app-bucket-unique-123 --delete
