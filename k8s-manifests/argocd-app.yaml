apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: aerolink-microservices
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/eshandineth/aerolink-platform.git'
    targetRevision: HEAD
    path: k8s-manifests
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
