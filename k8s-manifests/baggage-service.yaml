apiVersion: apps/v1
kind: Deployment
metadata:
  name: baggage-service
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: baggage-service
  template:
    metadata:
      labels:
        app: baggage-service
    spec:
      containers:
        - name: baggage-service
          image: 791945999903.dkr.ecr.us-east-1.amazonaws.com/aerolink/baggage-service:d211d3f4e3b5ed4074d7955f5b587d9138b5eee7
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: "production"
            - name: AWS_REGION
              value: "us-east-1"
---
apiVersion: v1
kind: Service
metadata:
  name: baggage-service
  namespace: default
spec:
  selector:
    app: baggage-service
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
  type: ClusterIP
